<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <!-- Configurações da página -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Título da aba -->
    <title>Jogo da Velha</title>

    <!-- Arquivo CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Container principal do jogo -->
    <div class="container-jogo">

        <!-- Botão para voltar ao menu -->
        <a href="index.html" class="voltar">
            ⬅ Voltar ao início
        </a>

        <!-- Título do jogo -->
        <h1>
            ❌ Jogo da Velha ⭕
        </h1>

        <!-- Configurações do jogo -->
        <div class="config-jogo">

            <!-- Escolha do modo -->
            <label for="modo">
                🎮 Modo de jogo:
            </label>

            <select id="modo">

                <option value="maquina">
                    🤖 Contra a Máquina
                </option>

                <option value="2jogadores">
                    👥 Dois Jogadores
                </option>

            </select>

            <br><br>

            <!-- Escolha da dificuldade -->
            <label for="dificuldade">
                🤖 Dificuldade:
            </label>

            <select id="dificuldade">

                <option value="facil">
                    🟢 Fácil
                </option>

                <option value="medio">
                    🟡 Médio
                </option>

                <option value="impossivel">
                    🔴 Impossível
                </option>

            </select>

        </div>

        <!-- Texto que mostra a vez do jogador -->
        <p id="status">
            Vez do jogador X
        </p>

        <!-- Tabuleiro -->
        <div class="tabuleiro">

            <div class="casa" onclick="jogar(0)"></div>
            <div class="casa" onclick="jogar(1)"></div>
            <div class="casa" onclick="jogar(2)"></div>

            <div class="casa" onclick="jogar(3)"></div>
            <div class="casa" onclick="jogar(4)"></div>
            <div class="casa" onclick="jogar(5)"></div>

            <div class="casa" onclick="jogar(6)"></div>
            <div class="casa" onclick="jogar(7)"></div>
            <div class="casa" onclick="jogar(8)"></div>

        </div>

        <!-- Botão de reiniciar -->
        <button
            class="btn-reiniciar"
            onclick="reiniciar()">

            🔄 Reiniciar

        </button>

    </div>

    <!-- Arquivo JavaScript -->
    <script src="velha.js"></script>

</body>

</html>
