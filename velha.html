<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <!-- ========================= -->
    <!-- CONFIGURAÇÕES DA PÁGINA -->
    <!-- ========================= -->

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Jogo da Velha</title>

    <!-- Arquivo CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ========================= -->
    <!-- CONTAINER PRINCIPAL -->
    <!-- ========================= -->

    <div class="container-jogo">

        <!-- Botão para voltar -->
        <a href="index.html" class="voltar">

            ⬅ Voltar ao início

        </a>

        <!-- Título -->
        <h1>

            ❌ Jogo da Velha ⭕

        </h1>

       <!-- ========================= -->
<!-- CONFIGURAÇÕES DO JOGO -->
<!-- ========================= -->

<div class="config-jogo">

    <!-- Escolha do modo -->
    <label for="modo">

        🎮 Modo de jogo:

    </label>

    <br><br>

    <select id="modo">

        <option value="2jogadores">

            👥 Dois Jogadores

        </option>

        <option value="maquina">

            🤖 Contra a Máquina

        </option>

    </select>

    <br><br>

    <!-- Escolha do símbolo -->
    <label for="simbolo">

        ❌⭕ Quem começa?

    </label>

    <br><br>

    <select id="simbolo">

        <option value="X">

            ❌ X

        </option>

        <option value="O">

            ⭕

            O

        </option>

    </select>

    <br><br>

    <!-- Dificuldade da máquina -->
    <div id="areaDificuldade">

        <label for="dificuldade">

            🤖 Dificuldade:

        </label>

        <br><br>

        <select id="dificuldade">

            <option value="facil">

                🟢 Fácil

            </option>

            <option value="medio">

                🟡 Médio

            </option>

            <option value="impossivel">

                🔴 Impossível

            </option>

        </select>

    </div>

</div>

<!-- ========================= -->
<!-- STATUS DA PARTIDA -->
<!-- ========================= -->

<p id="status">

    Vez do jogador X

</p>

        <!-- Tabuleiro -->
        <div class="tabuleiro">

            <div class="casa" onclick="jogar(0)"></div>
            <div class="casa" onclick="jogar(1)"></div>
            <div class="casa" onclick="jogar(2)"></div>

            <div class="casa" onclick="jogar(3)"></div>
            <div class="casa" onclick="jogar(4)"></div>
            <div class="casa" onclick="jogar(5)"></div>

            <div class="casa" onclick="jogar(6)"></div>
            <div class="casa" onclick="jogar(7)"></div>
            <div class="casa" onclick="jogar(8)"></div>

        </div>

        <!-- Botão de reiniciar -->
        <button
            class="btn-reiniciar"
            onclick="reiniciar()">

            🔄 Reiniciar

        </button>

    </div>

    <!-- JavaScript -->
    <script src="velha.js"></script>

</body>

</html>
